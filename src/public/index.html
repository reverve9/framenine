<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame NINE</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #111;
  color: #eee;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* --- Header --- */
header {
  padding: 20px 32px;
  border-bottom: 1px solid #222;
  display: flex;
  align-items: center;
  gap: 16px;
}

header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
}

header .subtitle {
  font-size: 12px;
  color: #666;
  letter-spacing: 1px;
}

header .nav-link {
  margin-left: auto;
  font-size: 12px;
  color: #888;
  text-decoration: none;
  padding: 6px 12px;
  border: 1px solid #333;
  border-radius: 4px;
  transition: color 0.15s, border-color 0.15s;
}

header .nav-link:hover {
  color: #eee;
  border-color: #666;
}

/* --- Main Layout --- */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* --- Sidebar --- */
.sidebar {
  width: 360px;
  min-width: 360px;
  border-right: 1px solid #222;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tabs {
  display: flex;
  border-bottom: 1px solid #222;
  overflow-x: auto;
}

.tab {
  padding: 12px 16px;
  font-size: 13px;
  color: #888;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}

.tab:hover { color: #ccc; }
.tab.active { color: #fff; border-bottom-color: #fff; }

.year-filter {
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  border-bottom: 1px solid #222;
}

.year-btn {
  padding: 4px 12px;
  font-size: 12px;
  border-radius: 12px;
  border: 1px solid #333;
  background: transparent;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
}

.year-btn:hover { border-color: #666; color: #ccc; }
.year-btn.active { background: #fff; color: #111; border-color: #fff; }

.video-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.video-card {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  gap: 12px;
  align-items: center;
  transition: background 0.15s;
}

.video-card:hover { background: #1a1a1a; }
.video-card.active { background: #1e1e2e; }

.video-card .thumb {
  width: 120px;
  height: 68px;
  border-radius: 4px;
  object-fit: cover;
  background: #222;
  flex-shrink: 0;
}

.video-card .thumb-placeholder {
  width: 120px;
  height: 68px;
  border-radius: 4px;
  background: #222;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #444;
  font-size: 20px;
}

.video-card .info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.video-card .name {
  font-size: 14px;
  color: #ddd;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.video-card .meta-line {
  font-size: 11px;
  color: #666;
  display: flex;
  gap: 8px;
}

.video-card .badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
  align-self: flex-start;
}

.badge.ready { background: #1a3a1a; color: #4ade80; }
.badge.pending { background: #3a2a1a; color: #fbbf24; }

.copy-btn {
  font-size: 14px;
  background: none;
  border: none;
  cursor: pointer;
  color: #444;
  padding: 2px 4px;
  border-radius: 4px;
  flex-shrink: 0;
  align-self: flex-start;
  transition: color 0.15s;
  line-height: 1;
}
.copy-btn:hover { color: #aaa; }
.copy-btn.copied { color: #4ade80; }

/* --- Player Area --- */
.player-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  background: #0a0a0a;
}

.player-container {
  width: 100%;
  max-width: 960px;
}

video {
  width: 100%;
  background: #000;
  border-radius: 8px;
}

.player-controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
}

.now-playing {
  font-size: 14px;
  color: #888;
}

.quality-select {
  padding: 6px 12px;
  font-size: 13px;
  background: #222;
  color: #ccc;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: pointer;
}

.quality-select option { background: #222; }

.placeholder {
  text-align: center;
  color: #444;
}

.placeholder .icon { font-size: 48px; margin-bottom: 16px; }
.placeholder .text { font-size: 14px; }

/* --- Admin Panel --- */
.admin-panel {
  border-bottom: 1px solid #222;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.admin-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.admin-btn {
  padding: 5px 12px;
  font-size: 12px;
  background: #1e1e1e;
  color: #aaa;
  border: 1px solid #333;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
}

.admin-btn:hover:not(:disabled) { background: #2a2a2a; color: #eee; }
.admin-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.admin-info {
  flex: 1;
  min-width: 0;
}

.admin-text {
  font-size: 11px;
  color: #666;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.progress-bar {
  height: 2px;
  background: #222;
  border-radius: 2px;
}

.progress-fill {
  height: 100%;
  background: #4ade80;
  border-radius: 2px;
  transition: width 0.4s;
  width: 0%;
}

.progress-fill.error { background: #f87171; }

/* --- Login Modal --- */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 28px 32px;
  width: 300px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.modal h2 {
  font-size: 15px;
  font-weight: 600;
  color: #eee;
  margin: 0;
}

.modal input[type="password"] {
  padding: 8px 12px;
  background: #111;
  border: 1px solid #333;
  border-radius: 6px;
  color: #eee;
  font-size: 14px;
  outline: none;
}

.modal input[type="password"]:focus { border-color: #555; }

.modal-error {
  font-size: 12px;
  color: #f87171;
  min-height: 16px;
}

.modal-btns {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.modal-btns button {
  padding: 6px 16px;
  font-size: 13px;
  border-radius: 6px;
  border: 1px solid #333;
  cursor: pointer;
}

.btn-cancel { background: transparent; color: #888; }
.btn-cancel:hover { color: #ccc; }
.btn-confirm { background: #eee; color: #111; border-color: #eee; }
.btn-confirm:hover { background: #fff; }

/* --- Admin lock --- */
.admin-lock {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #555;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color 0.15s;
  align-self: flex-end;
}
.admin-lock:hover { color: #aaa; }
.admin-lock.unlocked { color: #4ade80; }

/* --- Responsive --- */
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .sidebar {
    width: 100%;
    min-width: unset;
    max-height: 40vh;
    border-right: none;
    border-bottom: 1px solid #222;
  }
}
</style>
</head>
<body>

<header>
  <h1>FRAME NINE</h1>
  <span class="subtitle">PORTFOLIO STREAMING</span>
  <a href="/files/" class="nav-link">파일 공유 →</a>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="admin-panel">
      <div class="admin-row" style="justify-content:space-between; padding-bottom:4px;">
        <span style="font-size:11px; color:#444; letter-spacing:1px;">ADMIN</span>
        <div class="admin-lock" id="adminLock">🔒 로그인</div>
      </div>
      <div class="admin-row">
        <button class="admin-btn" id="scanBtn" disabled>스캔</button>
        <div class="admin-info">
          <div class="admin-text" id="scanText">파일 추가 시 자동 감지 중</div>
          <div class="progress-bar"><div class="progress-fill" id="scanProg"></div></div>
        </div>
      </div>
      <div class="admin-row">
        <button class="admin-btn" id="transcodeBtn" disabled>HLS 변환</button>
        <div class="admin-info">
          <div class="admin-text" id="transcodeText">대기 중</div>
          <div class="progress-bar"><div class="progress-fill" id="transcodeProg"></div></div>
        </div>
      </div>
      <div class="admin-row">
        <button class="admin-btn" id="thumbBtn" disabled>썸네일 생성</button>
        <div class="admin-info">
          <div class="admin-text" id="thumbText">대기 중</div>
          <div class="progress-bar"><div class="progress-fill" id="thumbProg"></div></div>
        </div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="year-filter" id="yearFilter"></div>
    <div class="video-list" id="videoList"></div>
  </aside>

  <section class="player-area">
    <div class="player-container">
      <div id="placeholder" class="placeholder">
        <div class="icon">&#9654;</div>
        <div class="text">영상을 선택하세요</div>
      </div>
      <div id="playerWrap" style="display:none;">
        <video id="video" controls></video>
        <div class="player-controls">
          <span class="now-playing" id="nowPlaying"></span>
          <select class="quality-select" id="qualitySelect">
            <option value="-1">AUTO</option>
          </select>
        </div>
      </div>
    </div>
  </section>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <h2>관리자 로그인</h2>
    <input type="password" id="pwInput" placeholder="비밀번호" />
    <div class="modal-error" id="loginError"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="loginCancel">취소</button>
      <button class="btn-confirm" id="loginConfirm">로그인</button>
    </div>
  </div>
</div>

<script>
(function () {
  let portfolio = [];
  let activeCategory = null;
  let activeYear = 'all';
  let activeVideoUrl = null;
  let hls = null;

  const $tabs = document.getElementById('tabs');
  const $yearFilter = document.getElementById('yearFilter');
  const $videoList = document.getElementById('videoList');
  const $video = document.getElementById('video');
  const $placeholder = document.getElementById('placeholder');
  const $playerWrap = document.getElementById('playerWrap');
  const $nowPlaying = document.getElementById('nowPlaying');
  const $qualitySelect = document.getElementById('qualitySelect');

  // --- Fetch Portfolio ---
  async function loadPortfolio() {
    const res = await fetch('/api/portfolio');
    const data = await res.json();
    portfolio = data.categories || [];
    if (portfolio.length > 0) {
      activeCategory = portfolio[0].name;
    }
    renderTabs();
    renderYears();
    renderVideos();
  }

  // --- Tabs ---
  function renderTabs() {
    $tabs.innerHTML = '';
    portfolio.forEach(cat => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (cat.name === activeCategory ? ' active' : '');
      tab.textContent = cat.name;
      tab.addEventListener('click', () => {
        activeCategory = cat.name;
        activeYear = 'all';
        renderTabs();
        renderYears();
        renderVideos();
      });
      $tabs.appendChild(tab);
    });
  }

  // --- Year Filter ---
  function renderYears() {
    $yearFilter.innerHTML = '';
    const cat = portfolio.find(c => c.name === activeCategory);
    if (!cat) return;

    const years = cat.years.map(y => y.year).sort().reverse();

    const allBtn = document.createElement('button');
    allBtn.className = 'year-btn' + (activeYear === 'all' ? ' active' : '');
    allBtn.textContent = 'ALL';
    allBtn.addEventListener('click', () => {
      activeYear = 'all';
      renderYears();
      renderVideos();
    });
    $yearFilter.appendChild(allBtn);

    years.forEach(yr => {
      const btn = document.createElement('button');
      btn.className = 'year-btn' + (activeYear === yr ? ' active' : '');
      btn.textContent = yr;
      btn.addEventListener('click', () => {
        activeYear = yr;
        renderYears();
        renderVideos();
      });
      $yearFilter.appendChild(btn);
    });
  }

  // --- Helpers ---
  function formatDuration(seconds) {
    if (!seconds) return '';
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return m + ':' + String(s).padStart(2, '0');
  }

  function formatRes(meta) {
    if (!meta || !meta.height) return '';
    return meta.height + 'p';
  }

  // --- Video List ---
  function renderVideos() {
    $videoList.innerHTML = '';
    const cat = portfolio.find(c => c.name === activeCategory);
    if (!cat) return;

    const years = activeYear === 'all' ? cat.years : cat.years.filter(y => y.year === activeYear);

    years.forEach(yr => {
      yr.files.forEach(file => {
        const card = document.createElement('div');
        card.className = 'video-card' + (file.streamUrl === activeVideoUrl ? ' active' : '');

        // 썸네일
        if (file.thumbnailUrl) {
          const img = document.createElement('img');
          img.className = 'thumb';
          img.src = file.thumbnailUrl;
          img.alt = '';
          img.loading = 'lazy';
          card.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.className = 'thumb-placeholder';
          ph.innerHTML = '&#9654;';
          card.appendChild(ph);
        }

        // 정보 영역
        const info = document.createElement('div');
        info.className = 'info';

        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = file.filename.replace('.mp4', '') + ' (' + yr.year + ')';
        info.appendChild(name);

        // 메타 라인
        const metaParts = [];
        if (file.meta) {
          const dur = formatDuration(file.meta.duration);
          if (dur) metaParts.push(dur);
          const res = formatRes(file.meta);
          if (res) metaParts.push(res);
        }
        if (metaParts.length > 0) {
          const metaLine = document.createElement('span');
          metaLine.className = 'meta-line';
          metaLine.textContent = metaParts.join(' / ');
          info.appendChild(metaLine);
        }

        card.appendChild(info);

        // 뱃지
        const badge = document.createElement('span');
        badge.className = 'badge ' + (file.hlsReady ? 'ready' : 'pending');
        badge.textContent = file.hlsReady ? 'READY' : '변환 필요';
        card.appendChild(badge);

        if (file.hlsReady && file.streamUrl) {
          // 공개 링크 복사 버튼
          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.title = '링크 복사';
          copyBtn.innerHTML = '&#128279;';
          copyBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const url = window.location.origin + file.streamUrl;
            navigator.clipboard.writeText(url).then(() => {
              copyBtn.innerHTML = '&#10003;';
              copyBtn.classList.add('copied');
              setTimeout(() => {
                copyBtn.innerHTML = '&#128279;';
                copyBtn.classList.remove('copied');
              }, 1500);
            });
          });
          card.appendChild(copyBtn);

          card.addEventListener('click', () => {
            playVideo(file.streamUrl, file.filename);
            activeVideoUrl = file.streamUrl;
            renderVideos();
          });
        }

        $videoList.appendChild(card);
      });
    });
  }

  // --- HLS Player ---
  function playVideo(url, filename) {
    $placeholder.style.display = 'none';
    $playerWrap.style.display = 'block';
    $nowPlaying.textContent = filename.replace('.mp4', '');

    if (hls) {
      hls.destroy();
    }

    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia($video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        $video.play();
        updateQualityOptions();
      });

      hls.on(Hls.Events.LEVEL_SWITCHED, () => {
        updateQualitySelect();
      });
    } else if ($video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      $video.src = url;
      $video.addEventListener('loadedmetadata', () => $video.play(), { once: true });
      $qualitySelect.innerHTML = '<option value="-1">AUTO</option>';
    }
  }

  // --- Quality ---
  function updateQualityOptions() {
    $qualitySelect.innerHTML = '<option value="-1">AUTO</option>';
    if (!hls) return;

    hls.levels.forEach((level, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = level.height + 'p';
      $qualitySelect.appendChild(opt);
    });

    updateQualitySelect();
  }

  function updateQualitySelect() {
    if (!hls) return;
    if (hls.autoLevelEnabled) {
      $qualitySelect.value = '-1';
    } else {
      $qualitySelect.value = hls.currentLevel;
    }
  }

  $qualitySelect.addEventListener('change', () => {
    if (!hls) return;
    const val = parseInt($qualitySelect.value);
    if (val === -1) {
      hls.currentLevel = -1;
    } else {
      hls.currentLevel = val;
    }
  });

  // --- Auth ---
  const $adminLock  = document.getElementById('adminLock');
  const $loginModal = document.getElementById('loginModal');
  const $pwInput    = document.getElementById('pwInput');
  const $loginError = document.getElementById('loginError');
  const $loginCancel  = document.getElementById('loginCancel');
  const $loginConfirm = document.getElementById('loginConfirm');

  let adminToken = localStorage.getItem('adminToken') || null;

  function setAdminUnlocked(unlocked) {
    const btns = [$scanBtn, $transcodeBtn, $thumbBtn];
    btns.forEach(b => b.disabled = !unlocked);
    $adminLock.textContent = unlocked ? '🔓 로그아웃' : '🔒 로그인';
    $adminLock.classList.toggle('unlocked', unlocked);
  }

  async function verifyStoredToken() {
    if (!adminToken) return;
    // 간단히 보호된 API 호출로 토큰 유효성 확인
    const res = await fetch('/api/transcode/status').catch(() => null);
    if (res && res.ok) setAdminUnlocked(true);
    else { adminToken = null; localStorage.removeItem('adminToken'); }
  }

  $adminLock.addEventListener('click', () => {
    if (adminToken) {
      // 로그아웃
      adminToken = null;
      localStorage.removeItem('adminToken');
      setAdminUnlocked(false);
      return;
    }
    $pwInput.value = '';
    $loginError.textContent = '';
    $loginModal.classList.add('open');
    setTimeout(() => $pwInput.focus(), 50);
  });

  $loginCancel.addEventListener('click', () => $loginModal.classList.remove('open'));

  async function doLogin() {
    const pw = $pwInput.value;
    if (!pw) return;
    $loginError.textContent = '';
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      const d = await res.json();
      if (!res.ok) { $loginError.textContent = d.error || '오류'; return; }
      adminToken = d.token;
      localStorage.setItem('adminToken', adminToken);
      $loginModal.classList.remove('open');
      setAdminUnlocked(true);
    } catch { $loginError.textContent = '연결 오류'; }
  }

  $loginConfirm.addEventListener('click', doLogin);
  $pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function authHeaders() {
    return adminToken ? { 'Authorization': `Bearer ${adminToken}` } : {};
  }

  // --- Admin Panel ---
  const $scanBtn      = document.getElementById('scanBtn');
  const $scanText     = document.getElementById('scanText');
  const $scanProg     = document.getElementById('scanProg');
  const $transcodeBtn = document.getElementById('transcodeBtn');
  const $thumbBtn     = document.getElementById('thumbBtn');
  const $transcodeText = document.getElementById('transcodeText');
  const $thumbText    = document.getElementById('thumbText');
  const $transcodeProg = document.getElementById('transcodeProg');
  const $thumbProg    = document.getElementById('thumbProg');

  let transcodePoller = null;
  let thumbPoller     = null;

  function updateTranscodeUI(d) {
    const done = (d.completed || 0) + (d.failed || 0) + (d.skipped || 0);
    const pct  = d.total > 0 ? Math.round(done / d.total * 100) : 0;
    $transcodeProg.style.width = pct + '%';
    $transcodeProg.classList.toggle('error', d.failed > 0 && !d.running);

    if (d.running) {
      const active = (d.jobs || []).find(j => j.status === 'transcoding');
      const variant  = active?.currentVariant || '';
      const percent  = active?.progress?.percent ?? '';
      $transcodeText.textContent = variant
        ? `변환 중… ${variant} ${percent !== '' ? percent + '%' : ''}`
        : '변환 중…';
      $transcodeBtn.disabled = true;
    } else {
      if (d.total > 0) {
        const parts = [];
        if (d.completed) parts.push(`완료 ${d.completed}`);
        if (d.skipped)   parts.push(`스킵 ${d.skipped}`);
        if (d.failed)    parts.push(`실패 ${d.failed}`);
        $transcodeText.textContent = parts.join(' / ') || '완료';
      } else {
        $transcodeText.textContent = '대기 중';
      }
      $transcodeBtn.disabled = false;
      if (transcodePoller) { clearInterval(transcodePoller); transcodePoller = null; }
      if (d.completed > 0) loadPortfolio();
    }
  }

  function updateThumbUI(d) {
    const done = (d.completed || 0) + (d.failed || 0) + (d.skipped || 0);
    const pct  = d.total > 0 ? Math.round(done / d.total * 100) : 0;
    $thumbProg.style.width = pct + '%';
    $thumbProg.classList.toggle('error', d.failed > 0 && !d.running);

    if (d.running) {
      $thumbText.textContent = `생성 중… ${done}/${d.total}`;
      $thumbBtn.disabled = true;
    } else {
      if (d.total > 0) {
        const parts = [];
        if (d.completed) parts.push(`완료 ${d.completed}`);
        if (d.skipped)   parts.push(`스킵 ${d.skipped}`);
        if (d.failed)    parts.push(`실패 ${d.failed}`);
        $thumbText.textContent = parts.join(' / ') || '완료';
      } else {
        $thumbText.textContent = '대기 중';
      }
      $thumbBtn.disabled = false;
      if (thumbPoller) { clearInterval(thumbPoller); thumbPoller = null; }
      if (d.completed > 0) loadPortfolio();
    }
  }

  $scanBtn.addEventListener('click', async () => {
    $scanBtn.disabled = true;
    $scanText.textContent = '스캔 중…';
    $scanProg.style.width = '0%';
    try {
      const res = await fetch('/api/scan', { method: 'POST', headers: authHeaders() });
      const d   = await res.json();
      if (!res.ok) { $scanText.textContent = d.error || '오류'; $scanBtn.disabled = false; return; }
      await loadPortfolio();
      if (d.queued > 0) {
        $scanText.textContent = `${d.queued}개 변환 예약됨`;
        $scanProg.style.width = '100%';
        // 변환 상태도 폴링 시작
        if (!transcodePoller) {
          transcodePoller = setInterval(async () => {
            updateTranscodeUI(await fetch('/api/transcode/status').then(r => r.json()));
          }, 3000);
        }
      } else {
        $scanText.textContent = `${d.total}개 파일 확인 — 신규 없음`;
        $scanProg.style.width = '100%';
      }
    } catch { $scanText.textContent = '연결 오류'; }
    finally { $scanBtn.disabled = false; }
  });

  $transcodeBtn.addEventListener('click', async () => {
    $transcodeBtn.disabled = true;
    $transcodeText.textContent = '요청 중…';
    try {
      const res = await fetch('/api/transcode', { method: 'POST', headers: authHeaders() });
      const d   = await res.json();
      if (!res.ok) {
        $transcodeText.textContent = d.error || '오류';
        $transcodeBtn.disabled = false;
        return;
      }
      if (d.queued === 0) {
        $transcodeText.textContent = '변환할 영상 없음 (모두 완료)';
        $transcodeBtn.disabled = false;
        return;
      }
      $transcodeText.textContent = `${d.queued}개 변환 시작`;
      transcodePoller = setInterval(async () => {
        const s = await fetch('/api/transcode/status').then(r => r.json());
        updateTranscodeUI(s);
      }, 3000);
    } catch {
      $transcodeText.textContent = '연결 오류';
      $transcodeBtn.disabled = false;
    }
  });

  $thumbBtn.addEventListener('click', async () => {
    $thumbBtn.disabled = true;
    $thumbText.textContent = '요청 중…';
    try {
      const res = await fetch('/api/thumbnail', { method: 'POST', headers: authHeaders() });
      const d   = await res.json();
      if (!res.ok) {
        $thumbText.textContent = d.error || '오류';
        $thumbBtn.disabled = false;
        return;
      }
      $thumbText.textContent = `${d.total}개 생성 시작`;
      thumbPoller = setInterval(async () => {
        const s = await fetch('/api/thumbnail/status').then(r => r.json());
        updateThumbUI(s);
      }, 3000);
    } catch {
      $thumbText.textContent = '연결 오류';
      $thumbBtn.disabled = false;
    }
  });

  async function initAdminStatus() {
    try {
      const [ts, th] = await Promise.all([
        fetch('/api/transcode/status').then(r => r.json()),
        fetch('/api/thumbnail/status').then(r => r.json()),
      ]);
      updateTranscodeUI(ts);
      if (ts.running) transcodePoller = setInterval(async () => {
        updateTranscodeUI(await fetch('/api/transcode/status').then(r => r.json()));
      }, 3000);
      updateThumbUI(th);
      if (th.running) thumbPoller = setInterval(async () => {
        updateThumbUI(await fetch('/api/thumbnail/status').then(r => r.json()));
      }, 3000);
    } catch { /* 무시 */ }
  }

  // --- Init ---
  loadPortfolio();
  verifyStoredToken().then(() => initAdminStatus());
})();
</script>
</body>
</html>
